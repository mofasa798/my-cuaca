<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cuaca - Weather App</title>
  <link rel="stylesheet" href="/styles/output.css">
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full">
    <h1 class="text-4xl font-bold text-center mb-8 text-gray-800">🌤️ My Cuaca</h1>
    
    <!-- Form Input -->
    <div class="flex gap-2 mb-6">
      <input 
        type="text" 
        id="cityInput" 
        placeholder="Masukkan nama kota..."
        autocomplete="off"
        class="input-primary"
      >
      <button 
        id="searchBtn"
        class="btn-primary"
      >
        Cari
      </button>
    </div>

    <!-- Error Message -->
    <div id="error" class="hidden bg-red-50 text-red-600 px-4 py-3 rounded-lg mb-4 border-l-4 border-red-600"></div>

    <!-- Loading State -->
    <div id="loading" class="hidden text-center text-indigo-500 font-semibold py-5">
      ⏳ Memuat data...
    </div>

    <!-- Current Weather -->
    <div id="weatherResult" class="hidden card-gradient mb-6">
      <h2 id="cityName" class="text-2xl font-bold mb-4"></h2>
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center">
          <div class="text-sm opacity-90 mb-2">Suhu</div>
          <div class="text-2xl font-bold" id="temperature">-</div>
        </div>
        <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center">
          <div class="text-sm opacity-90 mb-2">Kondisi</div>
          <div class="text-lg font-semibold" id="condition">-</div>
        </div>
        <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center">
          <div class="text-sm opacity-90 mb-2">Kelembaban</div>
          <div class="text-2xl font-bold" id="humidity">-</div>
        </div>
        <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center">
          <div class="text-sm opacity-90 mb-2">Angin</div>
          <div class="text-2xl font-bold" id="wind">-</div>
        </div>
      </div>
    </div>

    <!-- Forecast Section -->
    <div id="forecastSection" class="hidden">
      <h3 class="text-lg font-bold text-gray-800 mb-4">📅 Prakiraan 3 Hari</h3>
      <div id="forecastResult" class="grid gap-4"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
