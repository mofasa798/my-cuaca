<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cuaca - Weather App</title>
  <link rel="stylesheet" href="/styles/output.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-transition" style="background: linear-gradient(135deg, #1e293b 0%, #334155 100%);">
  <div class="glass-card rounded-3xl p-8 max-w-md w-full backdrop-blur-xl border border-white/20 shadow-2xl">
    <h1 class="text-4xl font-bold text-center mb-8 text-white drop-shadow-lg">🌤️ My Cuaca</h1>
    
    <!-- Form Input -->
    <div class="flex gap-2 mb-6">
      <input 
        type="text" 
        id="cityInput" 
        placeholder="Masukkan nama kota..."
        autocomplete="off"
        class="input-primary"
      >
      <button 
        id="searchBtn"
        class="btn-primary"
      >
        Cari
      </button>
    </div>

    <!-- Error Message -->
    <div id="error" class="hidden bg-white/10 text-red-200 px-4 py-3 rounded-lg mb-4 border-l-4 border-red-300/70"></div>

    <!-- Loading State -->
    <div id="loading" class="hidden text-center text-cyan-100 font-semibold py-5">
      ⏳ Memuat data...
    </div>

    <!-- Current Weather -->
    <div id="weatherResult" class="hidden glass-panel mb-6">
      <div class="flex items-center justify-between gap-4 mb-4">
        <div>
          <h2 id="cityName" class="text-2xl font-bold mb-2 text-white"></h2>
          <p id="weatherSummary" class="text-sm text-white/80">-</p>
        </div>
        <div id="conditionIcon" class="condition-icon text-6xl">☀️</div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white/15 rounded-3xl p-4 text-center backdrop-blur-md border border-white/10">
          <div class="text-sm opacity-90 mb-2 text-white/80">Suhu</div>
          <div class="text-2xl font-bold text-white" id="temperature">-</div>
        </div>
        <div class="bg-white/15 rounded-3xl p-4 text-center backdrop-blur-md border border-white/10">
          <div class="text-sm opacity-90 mb-2 text-white/80">Kondisi</div>
          <div class="text-lg font-semibold text-white" id="condition">-</div>
        </div>
        <div class="bg-white/15 rounded-3xl p-4 text-center backdrop-blur-md border border-white/10">
          <div class="text-sm opacity-90 mb-2 text-white/80">Kelembaban</div>
          <div class="text-2xl font-bold text-white" id="humidity">-</div>
        </div>
        <div class="bg-white/15 rounded-3xl p-4 text-center backdrop-blur-md border border-white/10">
          <div class="text-sm opacity-90 mb-2 text-white/80">Angin</div>
          <div class="text-2xl font-bold text-white" id="wind">-</div>
        </div>
      </div>
    </div>

    <!-- Forecast Section -->
    <div id="forecastSection" class="hidden">
      <h3 class="text-lg font-semibold text-white/90 mb-4">📅 Prakiraan 3 Hari</h3>
      <div id="forecastResult" class="grid gap-4 sm:grid-cols-3"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
